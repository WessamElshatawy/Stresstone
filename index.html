<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StressTone</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<header>
  <h1>StressTone</h1>
  <nav>
    <button onclick="showScreen('learn')">Learn</button>
    <button onclick="showScreen('demo')">Live Demo</button>
  </nav>
</header>

<main>
  <!-- LEARN SCREEN -->
  <section id="learn" class="screen">
    <h2>Learn Mode</h2>
    <div id="wordTitle"></div>
  </section>

  <!-- LIVE DEMO -->
  <section id="demo" class="screen hidden">
    <h2>Live Tap Demo</h2>
    <label>Instrument:</label>
    <select id="instrument">
      <option value="piano">Piano</option>
      <option value="drum">Drum</option>
      <option value="bell">Bell</option>
    </select>

    <div id="tapVisual"></div>

    <div class="tap-buttons">
      <button onclick="tap('1')">Stressed</button>
      <button onclick="tap('0')">Unstressed</button>
    </div>

    <div class="record-controls">
      <button onclick="startRhythmRecording()">Start Recording</button>
      <button onclick="stopRhythmRecording()">Stop Recording</button>
      <button onclick="playRhythm()">Play Recorded Rhythm</button>
    </div>
  </section>

</main>

<script src="./audio.js"></script>
<script src="./app.js"></script>

</body>
</html>
